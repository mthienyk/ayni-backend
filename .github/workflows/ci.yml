name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: ayni
          POSTGRES_PASSWORD: ayni
          POSTGRES_DB: ayni
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ayni -d ayni"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://ayni:ayni@localhost:5432/ayni
      API_BASE_URL: http://localhost:3000
      JWT_ACCESS_SECRET: test-access-secret-min-32-characters-long
      JWT_REFRESH_SECRET: test-refresh-secret-min-32-characters-long
      AUTO_APPROVE_PHOTOS: "true"

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm db:migrate:deploy

      - run: pnpm lint

      - run: pnpm typecheck

      - run: pnpm test
